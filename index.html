<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário KitMojo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
            overflow: hidden;
            height: fit-content;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            padding: 30px 24px;
            text-align: center;
        }

        .header h1 { font-size: 28px; margin-bottom: 4px; letter-spacing: 1px; }
        .header p { font-size: 14px; opacity: 0.7; }

        /* Abas */
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: #1a1a2e;
            background: #fff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #1a73e8;
        }

        .tab-btn:hover:not(.active) {
            background: #eee;
        }

        .tab-content {
            display: none;
            padding: 24px;
        }

        .tab-content.active {
            display: block;
        }

        /* Formulário */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group label .obrigatorio {
            color: #e53935;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            background: #fafafa;
            resize: vertical;
            min-height: 80px;
        }

        .form-group textarea:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
            background: #fff;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            background: #fafafa;
        }

        .form-group input[type="text"]:focus,
        .form-group select:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
            background: #fff;
        }

        /* Checklist */
        .checklist-section {
            margin-bottom: 20px;
        }

        .checklist-section > label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .checklist-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #fafafa;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .check-item:hover {
            border-color: #1a73e8;
            background: #e8f0fe;
        }

        .check-item.checked {
            border-color: #2e7d32;
            background: #e8f5e9;
        }

        .check-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2e7d32;
            cursor: pointer;
            flex-shrink: 0;
        }

        .check-item span {
            font-size: 13px;
            color: #333;
            line-height: 1.3;
        }

        /* Cards de kit disponível */
        .kits-disponiveis {
            padding: 16px 24px 4px;
            border-bottom: 1px solid #e8e8e8;
            margin-bottom: 4px;
        }
        .kits-disponiveis-titulo {
            font-size: 12px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .kits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }
        .kit-card-sel {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #fff;
            text-align: left;
        }
        .kit-card-sel:hover { border-color: #1a73e8; background: #f0f6ff; }
        .kit-card-sel.selecionado { border-color: #1a73e8; background: #e8f0fe; }
        .kit-card-sel.em-uso {
            opacity: 0.45;
            cursor: not-allowed;
            background: #f5f5f5;
        }
        .kit-card-sel .kc-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .kit-card-sel.em-uso .kc-badge { background: #ffebee; color: #e53935; }
        .kit-card-sel:not(.em-uso) .kc-badge { background: #e8f5e9; color: #2e7d32; }
        .kit-card-sel .kc-nome {
            font-size: 12px;
            font-weight: 600;
            color: #222;
            line-height: 1.3;
        }
        .kit-card-sel .kc-detalhe {
            font-size: 11px;
            color: #777;
            margin-top: 3px;
            line-height: 1.3;
        }
        .kits-loading-txt { font-size: 12px; color: #aaa; }

        /* Seção iPhone */
        .iphone-section {
            margin-bottom: 20px;
        }

        .iphone-section > label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .iphone-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .iphone-option {
            flex: 1 1 calc(50% - 6px);
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            background: #fafafa;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .iphone-option:hover {
            border-color: #1a73e8;
            background: #e8f0fe;
        }

        .iphone-option.selected {
            border-color: #1a73e8;
            background: #e8f0fe;
        }

        .iphone-option input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #1a73e8;
            cursor: pointer;
        }

        .iphone-option span {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        /* Câmera */
        .camera-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background: #fafafa;
            transition: border-color 0.3s;
        }

        .camera-area.active { border-color: #1a73e8; background: #e8f0fe; }
        .camera-area.has-photo { border-color: #2e7d32; background: #e8f5e9; }

        .camera-area video {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            display: none;
            margin: 0 auto;
        }

        .camera-area canvas { display: none; }

        .photo-preview {
            display: none;
            max-width: 400px;
            margin: 0 auto;
        }

        .photo-preview img {
            width: 100%;
            border-radius: 8px;
            display: block;
        }

        .btn-camera {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 8px 4px;
        }

        .btn-abrir { background: #1a73e8; color: #fff; }
        .btn-abrir:hover { background: #1557b0; }
        .btn-tirar { background: #2e7d32; color: #fff; display: none; }
        .btn-tirar:hover { background: #1b5e20; }
        .btn-nova { background: #e53935; color: #fff; display: none; }
        .btn-nova:hover { background: #c62828; }

        .camera-placeholder {
            color: #999;
            font-size: 14px;
        }

        .camera-placeholder .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        /* Botão enviar */
        .btn-enviar {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .btn-enviar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26,26,46,0.4);
        }

        .btn-enviar:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Sucesso */
        .sucesso-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .sucesso-overlay.show { display: flex; }

        .sucesso-card {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            margin: 20px;
            animation: fadeInUp 0.4s ease;
        }

        .sucesso-card .check { font-size: 64px; margin-bottom: 16px; }
        .sucesso-card h2 { color: #2e7d32; margin-bottom: 8px; }
        .sucesso-card p { color: #666; margin-bottom: 20px; }
        .sucesso-card button {
            padding: 12px 32px;
            background: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        /* Erro */
        .erro-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .erro-overlay.show { display: flex; }

        .erro-card {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 450px;
            margin: 20px;
            animation: fadeInUp 0.4s ease;
        }

        .erro-card .icon-erro { font-size: 64px; margin-bottom: 16px; }
        .erro-card h2 { color: #e53935; margin-bottom: 8px; }
        .erro-card p { color: #666; margin-bottom: 12px; }
        .erro-card .erro-detalhe {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            color: #555;
            text-align: left;
            word-break: break-all;
            margin-bottom: 16px;
            max-height: 120px;
            overflow-y: auto;
        }
        .erro-card button {
            padding: 12px 32px;
            background: #e53935;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        /* Debug banner */
        .debug-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 16px 24px;
            font-size: 13px;
            color: #856404;
            display: none;
        }
        .debug-banner.show { display: block; }
        .debug-banner strong { display: block; margin-bottom: 4px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Separador */
        .separator {
            height: 1px;
            background: #e0e0e0;
            margin: 20px 0;
        }

        /* Marcar/Desmarcar todos */
        .check-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-check-action {
            padding: 6px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
            font-size: 12px;
            cursor: pointer;
            color: #555;
            transition: all 0.2s;
        }

        .btn-check-action:hover {
            background: #f0f0f0;
            border-color: #999;
        }

        /* Status de envio */
        .envio-status {
            text-align: center;
            padding: 8px;
            font-size: 13px;
            color: #666;
            display: none;
        }
        .envio-status.show { display: block; }

        @media (max-width: 520px) {
            body { padding: 10px; }
            .header { padding: 20px 16px; }
            .header h1 { font-size: 22px; }
            .tab-content { padding: 16px; }
            .checklist-grid { grid-template-columns: 1fr; }
            .iphone-options { flex-direction: column; }
            .debug-banner { margin: 12px 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>KitMojo</h1>
        <p>Controle de Entrega e Devolução</p>
    </div>

    <!-- Debug Banner -->
    <div class="debug-banner" id="debugBanner">
        <strong>Debug:</strong>
        <span id="debugMsg"></span>
    </div>

    <!-- Abas -->
    <div class="tabs">
        <button class="tab-btn active" onclick="trocarAba('entrega')">Entrega</button>
        <button class="tab-btn" onclick="trocarAba('devolucao')">Devolução</button>
    </div>

    <!-- ==================== ABA ENTREGA ==================== -->
    <div class="tab-content active" id="tab-entrega">
        <!-- Seletor de kit disponível -->
        <div class="kits-disponiveis">
            <div class="kits-disponiveis-titulo">Selecione um kit disponivel</div>
            <div class="kits-grid" id="kitsGrid">
                <span class="kits-loading-txt">Carregando...</span>
            </div>
        </div>
        <form id="formEntrega" onsubmit="enviarForm(event, 'entrega')">
            <!-- Vincular a solicitacao -->
            <div class="form-group">
                <label for="entrega-solicitacao">Vincular a uma solicitacao</label>
                <select id="entrega-solicitacao" onchange="preencherSolicitacao()">
                    <option value="">Nenhuma (entrega sem solicitacao)</option>
                </select>
                <div id="solicitacao-info" style="display:none;margin-top:8px;padding:10px 14px;border-radius:8px;background:#f0f2f5;font-size:13px;color:#555;border:1px solid #e0e0e0"></div>
            </div>

            <div class="form-group">
                <label for="entrega-quemEntregou">Nome de quem entregou <span class="obrigatorio">*</span></label>
                <input type="text" id="entrega-quemEntregou" placeholder="Digite o nome de quem entregou o kit" required>
            </div>

            <div class="form-group">
                <label for="entrega-quemRetirou">Nome de quem retirou <span class="obrigatorio">*</span></label>
                <input type="text" id="entrega-quemRetirou" placeholder="Digite o nome de quem retirou o kit" required>
            </div>

            <div class="form-group">
                <label for="entrega-local">Local de retirada <span class="obrigatorio">*</span></label>
                <input type="text" id="entrega-local" placeholder="Ex: Estúdio, Campo, Evento São Paulo..." required>
            </div>

            <div class="form-group">
                <label for="entrega-tipoKit">Tipo do KitMojo <span class="obrigatorio">*</span></label>
                <select id="entrega-tipoKit" required>
                    <option value="" disabled selected>Selecione o tipo</option>
                    <option value="LiveMode">LiveMode</option>
                    <option value="Alugado">Alugado</option>
                </select>
            </div>

            <div class="form-group">
                <label for="entrega-portSrt">Port SRT <span class="obrigatorio">*</span></label>
                <input type="text" id="entrega-portSrt" placeholder="Ex: 9000" required>
            </div>

            <!-- Tipo de Chip -->
            <div class="iphone-section">
                <label>Tipo de Chip <span class="obrigatorio">*</span></label>
                <div class="iphone-options">
                    <label class="iphone-option" onclick="selecionarRadio(this, 'entrega', 'chip')">
                        <input type="radio" name="entrega-chip" value="Fisico" required>
                        <span>Fisico</span>
                    </label>
                    <label class="iphone-option" onclick="selecionarRadio(this, 'entrega', 'chip')">
                        <input type="radio" name="entrega-chip" value="eSIM">
                        <span>eSIM</span>
                    </label>
                </div>
            </div>

            <div class="separator"></div>

            <!-- Celular iPhone -->
            <div class="iphone-section">
                <label>Modelo do iPhone no Kit <span class="obrigatorio">*</span></label>
                <div class="iphone-options">
                    <label class="iphone-option" onclick="selecionarRadio(this, 'entrega', 'iphone')">
                        <input type="radio" name="entrega-iphone" value="iPhone 15 Pro" required>
                        <span>iPhone 15 Pro</span>
                    </label>
                    <label class="iphone-option" onclick="selecionarRadio(this, 'entrega', 'iphone')">
                        <input type="radio" name="entrega-iphone" value="iPhone 16">
                        <span>iPhone 16</span>
                    </label>
                </div>
                <input type="text" id="entrega-numeroIphone" placeholder="Numero do celular" style="margin-top:10px;width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;" onfocus="this.style.borderColor='#1a73e8'" onblur="this.style.borderColor='#e0e0e0'">
            </div>

            <!-- Celular Android -->
            <div class="iphone-section" style="margin-top: 16px;">
                <label>Modelo do outro Celular no Kit <span class="obrigatorio">*</span></label>
                <div class="iphone-options">
                    <label class="iphone-option" onclick="selecionarRadio(this, 'entrega', 'android')">
                        <input type="radio" name="entrega-android" value="Motorola" required>
                        <span>Motorola</span>
                    </label>
                    <label class="iphone-option" onclick="selecionarRadio(this, 'entrega', 'android')">
                        <input type="radio" name="entrega-android" value="Samsung">
                        <span>Samsung</span>
                    </label>
                </div>
                <input type="text" id="entrega-numeroAndroid" placeholder="Numero do celular" style="margin-top:10px;width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;" onfocus="this.style.borderColor='#1a73e8'" onblur="this.style.borderColor='#e0e0e0'">
            </div>

            <div class="separator"></div>

            <!-- Checklist -->
            <div class="checklist-section">
                <label>Itens do Kit <span class="obrigatorio">*</span></label>
                <div class="check-actions">
                    <button type="button" class="btn-check-action" onclick="marcarTodos('entrega')">Marcar todos</button>
                    <button type="button" class="btn-check-action" onclick="desmarcarTodos('entrega')">Desmarcar todos</button>
                </div>
                <div class="checklist-grid" id="checklist-entrega"></div>
            </div>

            <div class="separator"></div>

            <!-- Foto -->
            <div class="form-group">
                <label>Foto do KitMojo (opcional)</label>
                <div class="camera-area" id="cameraArea-entrega">
                    <div class="camera-placeholder" id="placeholder-entrega">
                        Foto
                        Tire uma foto ou importe da galeria
                    </div>
                    <video id="video-entrega" autoplay playsinline></video>
                    <canvas id="canvas-entrega"></canvas>
                    <div class="photo-preview" id="preview-entrega">
                        <img id="img-entrega" src="" alt="Foto do KitMojo">
                    </div>
                    <input type="file" id="fileInput-entrega" accept="image/*" style="display:none" onchange="importarFoto(event, 'entrega')">
                    <div>
                        <button type="button" class="btn-camera btn-abrir" onclick="abrirCamera('entrega')">Abrir Camera</button>
                        <button type="button" class="btn-camera btn-abrir" onclick="document.getElementById('fileInput-entrega').click()">Importar Foto</button>
                        <button type="button" class="btn-camera btn-tirar" id="btnTirar-entrega" onclick="tirarFoto('entrega')">Tirar Foto</button>
                        <button type="button" class="btn-camera btn-tirar" id="btnVirar-entrega" onclick="virarCamera('entrega')" style="display:none">Virar Camera</button>
                        <button type="button" class="btn-camera btn-nova" id="btnNova-entrega" onclick="novaFoto('entrega')">Nova Foto</button>
                    </div>
                </div>
            </div>

            <!-- Observação -->
            <div class="form-group">
                <label for="entrega-observacao">Observação</label>
                <textarea id="entrega-observacao" placeholder="Alguma observação? (opcional)"></textarea>
            </div>

            <div class="envio-status" id="status-entrega"></div>
            <button type="submit" class="btn-enviar" id="btnEnviar-entrega" disabled>Enviar Entrega</button>
        </form>
    </div>

    <!-- ==================== ABA DEVOLUÇÃO ==================== -->
    <div class="tab-content" id="tab-devolucao">
        <form id="formDevolucao" onsubmit="enviarForm(event, 'devolucao')">
            <!-- Vincular a uma entrega ativa -->
            <div class="form-group">
                <label for="devolucao-entrega">Vincular a uma entrega ativa</label>
                <select id="devolucao-entrega" onchange="preencherEntrega()">
                    <option value="">Nenhuma (devolucao sem vinculo)</option>
                </select>
                <div id="entrega-info" style="display:none;margin-top:8px;padding:10px 14px;border-radius:8px;background:#f0f2f5;font-size:13px;color:#555;border:1px solid #e0e0e0"></div>
            </div>

            <div class="form-group">

<script>
    // ===== URL DO GOOGLE APPS SCRIPT (NOVA IMPLANTAÇÃO) =====
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwe4T80My2X1eK9cS5b2norp3cpFeVkZof0BggHpkwdDeHsqpnJNlxTOciuTD-wf4KBPg/exec';

    // ===== FORMATAR DATA =====
    function fmtData(str) {
        if (!str) return '';
        str = String(str).trim();
        if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(str)) return str;
        // Formato gviz: Date(2026,2,5,16,32,23)
        const gvizMatch = str.match(/^Date\((\d+),(\d+),(\d+)/);
        if (gvizMatch) {
            const d = new Date(parseInt(gvizMatch[1]), parseInt(gvizMatch[2]), parseInt(gvizMatch[3]));
            return d.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
        }
        try {
            const d = new Date(str);
            if (!isNaN(d.getTime())) {
                return d.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
            }
        } catch(e) {}
        return str;
    }

    // ===== SOLICITACOES PENDENTES =====
    let solicitacoesPendentes = [];

    async function carregarSolicitacoes() {
        try {
            const resp = await fetch(GOOGLE_SCRIPT_URL + '?action=solicitacoesPendentes', { redirect: 'follow' });
            if (resp.ok) {
                const todas = await resp.json();
                solicitacoesPendentes = Array.isArray(todas) ? todas.filter(s => s.status === 'Pendente') : [];
            }
        } catch (e) {
            console.warn('Erro ao carregar solicitacoes:', e);
            solicitacoesPendentes = [];
        }
        const sel = document.getElementById('entrega-solicitacao');
        sel.innerHTML = '<option value="">Nenhuma (entrega sem solicitacao)</option>';
        solicitacoesPendentes.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.quem + ' - ' + s.projeto + ' - ' + fmtData(s.quando) + ' (' + s.onde + ')';
            sel.appendChild(opt);
        });
    }

    function preencherSolicitacao() {
        const sel = document.getElementById('entrega-solicitacao');
        const info = document.getElementById('solicitacao-info');
        const sol = solicitacoesPendentes.find(s => s.id === sel.value);
        if (sol) {
            info.style.display = 'block';
            info.innerHTML = '<strong>Quando:</strong> ' + fmtData(sol.quando) +
                ' | <strong>Onde:</strong> ' + sol.onde +
                ' | <strong>Quem:</strong> ' + sol.quem +
                ' | <strong>Projeto:</strong> ' + sol.projeto +
                (sol.observacao ? ' | <strong>Obs:</strong> ' + sol.observacao : '');
        } else {
            info.style.display = 'none';
        }
    }

    carregarSolicitacoes();

    // ===== ENTREGAS ATIVAS (para vincular na devolucao) =====
    const SHEET_ID = '1ggGHnB1zleQPff-AGj2OAei_bUnaZsO8KLiFnzGyrI0';
    const SHEET_GID = '1349869099';
    let entregasAtivas = [];

    // Converte dataHora (formato gviz "Date(Y,M,D,h,m,s)" ou pt-BR "DD/MM/YYYY, HH:MM:SS") para timestamp numérico
    function parseDataHora(str) {
        if (!str) return 0;
        str = String(str).trim();
        const gviz = str.match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
        if (gviz) {
            return new Date(+gviz[1], +gviz[2], +gviz[3], +(gviz[4]||0), +(gviz[5]||0), +(gviz[6]||0)).getTime();
        }
        const pt = str.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:[,\s]+(\d{2}):(\d{2}):(\d{2}))?/);
        if (pt) {
            return new Date(+pt[3], +pt[2]-1, +pt[1], +(pt[4]||0), +(pt[5]||0), +(pt[6]||0)).getTime();
        }
        return new Date(str).getTime() || 0;
    }

    // ===== CARDS DE KITS DISPONÍVEIS (aba Entrega) =====
    function carregarKitsDisponiveis() {
        const cbName = '_kitmojoKitsCb_' + Date.now();
        window[cbName] = function(resp) {
            try {
                const registros = resp.table.rows.map(r => {
                    const vals = r.c.map(c => c ? (c.v != null ? String(c.v) : '') : '');
                    return { dataHora: vals[0], tipo: vals[1], nome1: vals[2], nome2: vals[3], tipoKit: vals[4], iphone: vals[5], android: vals[6], portSrt: vals[7], tipoChip: vals[8] };
                }).filter(r => r.tipo === 'ENTREGA' || r.tipo === 'DEVOLUÇÃO');

                registros.sort((a, b) => parseDataHora(a.dataHora) - parseDataHora(b.dataHora));

                // Estado atual de cada kit físico (tipoKit+iphone+android)
                const kitMap = new Map();
                registros.forEach(r => {
                    const key = `${r.tipoKit}|${r.iphone}|${r.android}|${r.tipoChip}`;
                    if (r.tipo === 'ENTREGA') {
                        kitMap.set(key, { emUso: true, comQuem: r.nome2, ultimoUsuario: r.nome2, tipoKit: r.tipoKit, iphone: r.iphone, android: r.android, tipoChip: r.tipoChip, portSrt: r.portSrt });
                    } else if (r.tipo === 'DEVOLUÇÃO') {
                        const prev = kitMap.get(key) || {};
                        kitMap.set(key, { emUso: false, comQuem: '', ultimoUsuario: r.nome1 || prev.comQuem || '', tipoKit: r.tipoKit || prev.tipoKit, iphone: r.iphone || prev.iphone, android: r.android || prev.android, tipoChip: r.tipoChip || prev.tipoChip, portSrt: r.portSrt || prev.portSrt });
                    }
                });

                const kits = [...kitMap.values()].sort((a, b) => (a.emUso ? 1 : 0) - (b.emUso ? 1 : 0));
                renderKitsGrid(kits);
            } catch(e) {
                document.getElementById('kitsGrid').innerHTML = '<span class="kits-loading-txt">Nao foi possivel carregar.</span>';
            }
            delete window[cbName];
            const s = document.getElementById('script_' + cbName);
            if (s) s.remove();
        };
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cbName}&gid=${SHEET_GID}`;
        const script = document.createElement('script');
        script.id = 'script_' + cbName;
        script.src = url;
        script.onerror = () => {
            document.getElementById('kitsGrid').innerHTML = '<span class="kits-loading-txt">Nao foi possivel carregar.</span>';
            delete window[cbName];
        };
        document.body.appendChild(script);
    }

    function renderKitsGrid(kits) {
        const grid = document.getElementById('kitsGrid');
        if (!kits.length) { grid.innerHTML = '<span class="kits-loading-txt">Nenhum kit encontrado.</span>'; return; }
        grid.innerHTML = kits.map((k, i) => {
            const emUso = k.emUso;
            const badge = emUso ? 'Em uso' : 'Disponivel';
            const nome = [k.tipoKit, k.iphone, k.android].filter(Boolean).join(' · ');
            const detalhe = emUso
                ? `Com: ${k.comQuem}`
                : k.ultimoUsuario ? `Ult: ${k.ultimoUsuario}` : 'Sem uso anterior';
            return `<div class="kit-card-sel${emUso ? ' em-uso' : ''}" onclick="${emUso ? '' : 'selecionarKitCard(this,' + i + ')'}" data-idx="${i}">
                <span class="kc-badge">${badge}</span>
                <div class="kc-nome">${nome}</div>
                <div class="kc-detalhe">${detalhe}</div>
            </div>`;
        }).join('');
        // Guardar dados dos kits para uso no preenchimento
        grid._kits = kits;
    }

    function selecionarKitCard(el, idx) {
        // Destacar card selecionado
        document.querySelectorAll('#kitsGrid .kit-card-sel').forEach(c => c.classList.remove('selecionado'));
        el.classList.add('selecionado');

        const kit = document.getElementById('kitsGrid')._kits[idx];
        if (!kit) return;

        // Preencher tipoKit
        const selTipo = document.getElementById('entrega-tipoKit');
        selTipo.value = kit.tipoKit;

        // Preencher Port SRT
        if (kit.portSrt) {
            document.getElementById('entrega-portSrt').value = kit.portSrt;
        }

        // Preencher chip
        if (kit.tipoChip) {
            document.querySelectorAll('input[name="entrega-chip"]').forEach(r => {
                r.closest('.iphone-option').classList.remove('selected');
                if (r.value === kit.tipoChip) {
                    r.checked = true;
                    r.closest('.iphone-option').classList.add('selected');
                }
            });
        }

        // Preencher iphone
        if (kit.iphone) {
            document.querySelectorAll('input[name="entrega-iphone"]').forEach(r => {
                r.closest('.iphone-option').classList.remove('selected');
                if (r.value === kit.iphone) {
                    r.checked = true;
                    r.closest('.iphone-option').classList.add('selected');
                }
            });
        }

        // Preencher android
        if (kit.android) {
            document.querySelectorAll('input[name="entrega-android"]').forEach(r => {
                r.closest('.iphone-option').classList.remove('selected');
                if (r.value === kit.android) {
                    r.checked = true;
                    r.closest('.iphone-option').classList.add('selected');
                }
            });
        }

        validarFormulario('entrega');
    }

    function carregarEntregasViaJSONP() {
        return new Promise((resolve) => {
            const cbName = '_kitmojoEntregasCb_' + Date.now();
            window[cbName] = function(resp) {
                try {
                    const rows = resp.table.rows;
                    const cols = resp.table.cols;
                    const registros = rows.map(r => {
                        const vals = r.c.map(c => c ? (c.v != null ? String(c.v) : '') : '');
                        return {
                            dataHora: vals[0],
                            tipo: vals[1],
                            nome1: vals[2],
                            nome2: vals[3],
                            tipoKit: vals[4],
                            iphone: vals[5],
                            android: vals[6],
                            portSrt: vals[7],
                            tipoChip: vals[8],
                            itensConferidos: vals[9],
                            itensFaltando: vals[10],
                            observacao: vals[11],
                            solicitacaoId: vals[14]
                        };
                    });

                    // Processar em ordem cronológica para matching correto
                    registros.sort((a, b) => parseDataHora(a.dataHora) - parseDataHora(b.dataHora));

                    // Matching sequencial: cada ENTREGA abre um slot, cada DEVOLUÇÃO fecha o slot correspondente
                    // Chave: pessoa + tipoKit + iphone + android (identifica o kit específico com quem está)
                    const ativasMap = new Map();
                    registros.forEach(r => {
                        if (r.tipo === 'ENTREGA') {
                            const key = `${r.nome2}|${r.tipoKit}|${r.iphone}|${r.android}|${r.tipoChip}`;
                            ativasMap.set(key, r);
                        } else if (r.tipo === 'DEVOLUÇÃO') {
                            const key = `${r.nome1}|${r.tipoKit}|${r.iphone}|${r.android}|${r.tipoChip}`;
                            ativasMap.delete(key);
                        }
                    });
                    entregasAtivas = [...ativasMap.values()];

                    montarDropdownEntregas();
                } catch(e) {
                    console.warn('Erro ao parsear entregas:', e);
                }
                delete window[cbName];
                const s = document.getElementById('script_' + cbName);
                if (s) s.remove();
                resolve();
            };
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cbName}&gid=${SHEET_GID}`;
            const script = document.createElement('script');
            script.id = 'script_' + cbName;
            script.src = url;
            script.onerror = () => { delete window[cbName]; resolve(); };
            document.body.appendChild(script);
        });
    }

    function montarDropdownEntregas() {
        const sel = document.getElementById('devolucao-entrega');
        sel.innerHTML = '<option value="">Nenhuma (devolucao sem vinculo)</option>';
        entregasAtivas.forEach((ent, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = ent.nome2 + ' - ' + ent.tipoKit + ' - ' + fmtData(ent.dataHora) + (ent.iphone ? ' (' + ent.iphone + ')' : '');
            sel.appendChild(opt);
        });
    }

    function preencherEntrega() {
        const sel = document.getElementById('devolucao-entrega');
        const info = document.getElementById('entrega-info');
        const idx = sel.value;
        if (idx !== '' && entregasAtivas[idx]) {
            const ent = entregasAtivas[idx];
            info.style.display = 'block';
            info.innerHTML = '<strong>Data:</strong> ' + fmtData(ent.dataHora) +
                ' | <strong>Quem retirou:</strong> ' + ent.nome2 +
                ' | <strong>Kit:</strong> ' + ent.tipoKit +
                ' | <strong>iPhone:</strong> ' + ent.iphone +
                ' | <strong>Android:</strong> ' + ent.android +
                (ent.tipoChip ? ' | <strong>Chip:</strong> ' + ent.tipoChip : '') +
                (ent.portSrt ? ' | <strong>Port SRT:</strong> ' + ent.portSrt : '');

            // Preencher campos automaticamente
            document.getElementById('devolucao-quemEstava').value = ent.nome2;
        } else {
            info.style.display = 'none';
        }
    }

    carregarEntregasViaJSONP();
    carregarKitsDisponiveis();

    // Lista de itens do checklist
    const itensKit = [
        'SmartRig Completo',
        'Conjunto Microfone DJI (Sem Fio)',
        'Microfone de Mão com Fio',
        'Cabo XLR para USB-C',
        'Estação de Carregamento',
        'Bastão de Microfone',
        'Cabos USB-C',
        'Cabo Mini P2',
        'Powerbank',
        'Tripé 1.70M',
        'Mochila do Tripé',
        'Mochila de Transporte do Kit',
        'Espuma',
        'Fone sem Fio',
        'Fone com Fio',
        'Cabo Adaptador de Áudio',
        'Luz de Vídeo LED',
        'Tripé Rotativo',
        'Cabo Áudio e Vídeo'
    ];

    // Debug helper
    function debugLog(msg) {
        console.log('[KitMojo]', msg);
        const banner = document.getElementById('debugBanner');
        const msgEl = document.getElementById('debugMsg');
        msgEl.textContent = msg;
        banner.classList.add('show');
    }

    function hideDebug() {
        document.getElementById('debugBanner').classList.remove('show');
    }

    function showStatus(tab, msg) {
        const el = document.getElementById('status-' + tab);
        el.textContent = msg;
        el.classList.add('show');
    }

    function hideStatus(tab) {
        const el = document.getElementById('status-' + tab);
        el.classList.remove('show');
    }

    // Gerar checklists nas duas abas
    function gerarChecklist(tabId) {
        const container = document.getElementById('checklist-' + tabId);
        itensKit.forEach((item, i) => {
            const id = tabId + '-item-' + i;
            const div = document.createElement('label');
            div.className = 'check-item';
            div.setAttribute('for', id);
            div.innerHTML = `<input type="checkbox" id="${id}" value="${item}" onchange="toggleCheckItem(this)"><span>${item}</span>`;
            container.appendChild(div);
        });
    }

    gerarChecklist('entrega');
    gerarChecklist('devolucao');

    // Visual do check item
    function toggleCheckItem(cb) {
        const parent = cb.closest('.check-item');
        if (cb.checked) {
            parent.classList.add('checked');
        } else {
            parent.classList.remove('checked');
        }
        validarFormulario(cb.id.startsWith('entrega') ? 'entrega' : 'devolucao');
    }

    // Marcar/Desmarcar todos
    function marcarTodos(tab) {
        document.querySelectorAll('#checklist-' + tab + ' input[type="checkbox"]').forEach(cb => {
            cb.checked = true;
            cb.closest('.check-item').classList.add('checked');
        });
        validarFormulario(tab);
    }

    function desmarcarTodos(tab) {
        document.querySelectorAll('#checklist-' + tab + ' input[type="checkbox"]').forEach(cb => {
            cb.checked = false;
            cb.closest('.check-item').classList.remove('checked');
        });
        validarFormulario(tab);
    }

    // Celular seleção visual
    function selecionarRadio(el, tab, grupo) {
        // Limpa apenas as opções do mesmo grupo (mesmo name)
        const name = el.querySelector('input[type="radio"]').name;
        document.querySelectorAll('input[name="' + name + '"]').forEach(r => {
            r.closest('.iphone-option').classList.remove('selected');
        });
        el.classList.add('selected');
        validarFormulario(tab);
    }

    // Manter compatibilidade
    function selecionarIphone(el, tab) {
        selecionarRadio(el, tab, 'iphone');
    }

    // Trocar abas
    function trocarAba(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        if (tab === 'entrega') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }
        document.getElementById('tab-' + tab).classList.add('active');
        hideDebug();
    }

    // Câmera por aba
    const streams = { entrega: null, devolucao: null };
    const fotos = { entrega: false, devolucao: false };
    const cameraFacing = { entrega: 'environment', devolucao: 'environment' };

    async function abrirCamera(tab) {
        try {
            const s = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: cameraFacing[tab], width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            streams[tab] = s;
            const video = document.getElementById('video-' + tab);
            video.srcObject = s;
            video.style.display = 'block';
            document.getElementById('placeholder-' + tab).style.display = 'none';
            const area = document.getElementById('cameraArea-' + tab);
            area.querySelectorAll('.btn-abrir').forEach(b => b.style.display = 'none');
            document.getElementById('btnTirar-' + tab).style.display = 'inline-flex';
            document.getElementById('btnVirar-' + tab).style.display = 'inline-flex';
            area.classList.add('active');
        } catch (err) {
            alert('Erro ao acessar a câmera. Verifique as permissões do navegador.');
        }
    }

    async function virarCamera(tab) {
        pararCamera(tab);
        cameraFacing[tab] = cameraFacing[tab] === 'environment' ? 'user' : 'environment';
        await abrirCamera(tab);
    }

    function importarFoto(event, tab) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('img-' + tab).src = e.target.result;
            document.getElementById('preview-' + tab).style.display = 'block';
            pararCamera(tab);
            document.getElementById('video-' + tab).style.display = 'none';
            document.getElementById('placeholder-' + tab).style.display = 'none';
            document.getElementById('btnTirar-' + tab).style.display = 'none';
            document.getElementById('btnVirar-' + tab).style.display = 'none';
            document.getElementById('btnNova-' + tab).style.display = 'inline-flex';
            const area = document.getElementById('cameraArea-' + tab);
            area.querySelectorAll('.btn-abrir').forEach(b => b.style.display = 'none');
            area.classList.remove('active');
            area.classList.add('has-photo');
            fotos[tab] = true;
            validarFormulario(tab);
        };
        reader.readAsDataURL(file);
    }

    function tirarFoto(tab) {
        const video = document.getElementById('video-' + tab);
        const canvas = document.getElementById('canvas-' + tab);
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        document.getElementById('img-' + tab).src = dataUrl;
        document.getElementById('preview-' + tab).style.display = 'block';

        pararCamera(tab);
        video.style.display = 'none';
        document.getElementById('btnTirar-' + tab).style.display = 'none';
        document.getElementById('btnVirar-' + tab).style.display = 'none';
        document.getElementById('btnNova-' + tab).style.display = 'inline-flex';

        const area = document.getElementById('cameraArea-' + tab);
        area.classList.remove('active');
        area.classList.add('has-photo');

        fotos[tab] = true;
        validarFormulario(tab);
    }

    function novaFoto(tab) {
        document.getElementById('preview-' + tab).style.display = 'none';
        document.getElementById('img-' + tab).src = '';
        document.getElementById('btnNova-' + tab).style.display = 'none';
        document.getElementById('fileInput-' + tab).value = '';
        document.getElementById('cameraArea-' + tab).classList.remove('has-photo');
        fotos[tab] = false;
        validarFormulario(tab);
        // Mostrar botões iniciais para escolher camera ou importar
        document.getElementById('placeholder-' + tab).style.display = 'block';
        const area = document.getElementById('cameraArea-' + tab);
        area.querySelectorAll('.btn-abrir').forEach(b => b.style.display = 'inline-flex');
    }

    function pararCamera(tab) {
        if (streams[tab]) {
            streams[tab].getTracks().forEach(t => t.stop());
            streams[tab] = null;
        }
    }

    // Validação
    function validarFormulario(tab) {
        if (tab === 'entrega') {
            const nome1 = document.getElementById('entrega-quemEntregou').value.trim();
            const nome2 = document.getElementById('entrega-quemRetirou').value.trim();
            const local = document.getElementById('entrega-local').value.trim();
            const tipo = document.getElementById('entrega-tipoKit').value;
            const portSrt = document.getElementById('entrega-portSrt').value.trim();
            const chip = document.querySelector('input[name="entrega-chip"]:checked');
            const iphone = document.querySelector('input[name="entrega-iphone"]:checked');
            const android = document.querySelector('input[name="entrega-android"]:checked');
            const checks = document.querySelectorAll('#checklist-entrega input:checked').length;
            document.getElementById('btnEnviar-entrega').disabled = !(nome1 && nome2 && local && tipo && portSrt && chip && iphone && android && checks > 0);
        } else {
            const nome1 = document.getElementById('devolucao-quemEstava').value.trim();
            const nome2 = document.getElementById('devolucao-quemPegou').value.trim();
            const local = document.getElementById('devolucao-local').value.trim();
            const tipo = document.getElementById('devolucao-tipoKit').value;
            const chip = document.querySelector('input[name="devolucao-chip"]:checked');
            const iphone = document.querySelector('input[name="devolucao-iphone"]:checked');
            const android = document.querySelector('input[name="devolucao-android"]:checked');
            const checks = document.querySelectorAll('#checklist-devolucao input:checked').length;
            document.getElementById('btnEnviar-devolucao').disabled = !(nome1 && nome2 && local && tipo && chip && iphone && android && checks > 0);
        }
    }

    // Listeners de validação
    ['entrega-quemEntregou', 'entrega-quemRetirou', 'entrega-local', 'entrega-portSrt'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => validarFormulario('entrega'));
    });
    document.getElementById('entrega-tipoKit').addEventListener('change', () => validarFormulario('entrega'));

    ['devolucao-quemEstava', 'devolucao-quemPegou', 'devolucao-local'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => validarFormulario('devolucao'));
    });
    document.getElementById('devolucao-tipoKit').addEventListener('change', () => validarFormulario('devolucao'));

    // Fechar erro
    function fecharErro() {
        document.getElementById('erroOverlay').classList.remove('show');
    }

    // Mostrar erro com detalhes
    function mostrarErro(detalhe) {
        document.getElementById('erroDetalhe').textContent = detalhe;
        document.getElementById('erroOverlay').classList.add('show');
    }

    // ===== ENVIAR =====
    async function enviarForm(e, tab) {
        e.preventDefault();

        const btnEnviar = document.getElementById('btnEnviar-' + tab);
        const textoOriginal = btnEnviar.textContent;
        btnEnviar.disabled = true;
        btnEnviar.textContent = 'Enviando...';
        showStatus(tab, 'Preparando dados...');
        hideDebug();

        let dados = {};

        if (tab === 'entrega') {
            const checkedItems = [...document.querySelectorAll('#checklist-entrega input:checked')].map(c => c.value);
            dados = {
                tipo: 'ENTREGA',
                nome1: document.getElementById('entrega-quemEntregou').value.trim(),
                nome2: document.getElementById('entrega-quemRetirou').value.trim(),
                local: document.getElementById('entrega-local').value.trim(),
                tipoKit: document.getElementById('entrega-tipoKit').value,
                portSrt: document.getElementById('entrega-portSrt').value.trim(),
                tipoChip: document.querySelector('input[name="entrega-chip"]:checked').value,
                iphone: document.querySelector('input[name="entrega-iphone"]:checked').value,
                android: document.querySelector('input[name="entrega-android"]:checked').value,
                itensConferidos: checkedItems.join(', '),
                itensFaltando: itensKit.filter(i => !checkedItems.includes(i)).join(', '),
                observacao: document.getElementById('entrega-observacao').value.trim(),
                foto: document.getElementById('img-entrega').src,
                dataHora: new Date().toLocaleString('pt-BR'),
                solicitacaoId: document.getElementById('entrega-solicitacao').value || '',
                numeroIphone: document.getElementById('entrega-numeroIphone').value.trim(),
                numeroAndroid: document.getElementById('entrega-numeroAndroid').value.trim()
            };
            document.getElementById('sucessoTitulo').textContent = 'Entrega Registrada!';
            document.getElementById('sucessoMsg').textContent = 'A entrega do KitMojo foi registrada com sucesso.';
        } else {
            const checkedItems = [...document.querySelectorAll('#checklist-devolucao input:checked')].map(c => c.value);
            dados = {
                tipo: 'DEVOLUÇÃO',
                nome1: document.getElementById('devolucao-quemEstava').value.trim(),
                nome2: document.getElementById('devolucao-quemPegou').value.trim(),
                local: document.getElementById('devolucao-local').value.trim(),
                tipoKit: document.getElementById('devolucao-tipoKit').value,
                tipoChip: document.querySelector('input[name="devolucao-chip"]:checked').value,
                iphone: document.querySelector('input[name="devolucao-iphone"]:checked').value,
                android: document.querySelector('input[name="devolucao-android"]:checked').value,
                itensConferidos: checkedItems.join(', '),
                itensFaltando: itensKit.filter(i => !checkedItems.includes(i)).join(', '),
                observacao: document.getElementById('devolucao-observacao').value.trim(),
                foto: document.getElementById('img-devolucao').src,
                dataHora: new Date().toLocaleString('pt-BR'),
                numeroIphone: document.getElementById('devolucao-numeroIphone').value.trim(),
                numeroAndroid: document.getElementById('devolucao-numeroAndroid').value.trim(),
                solicitacaoId: (() => { const idx = document.getElementById('devolucao-entrega').value; return (idx !== '' && entregasAtivas[idx]) ? (entregasAtivas[idx].solicitacaoId || '') : ''; })()
            };
            document.getElementById('sucessoTitulo').textContent = 'Devolução Registrada!';
            document.getElementById('sucessoMsg').textContent = 'A devolução do KitMojo foi registrada com sucesso.';
        }

        // Log do tamanho do payload (foto base64 pode ser grande)
        const payload = JSON.stringify(dados);
        const tamanhoMB = (payload.length / 1024 / 1024).toFixed(2);
        console.log('[KitMojo] Tamanho do payload:', tamanhoMB, 'MB');
        showStatus(tab, 'Enviando dados (' + tamanhoMB + ' MB)...');

        // ===== ESTRATÉGIA DE ENVIO =====
        // Tentativa 1: fetch normal (permite ver a resposta)
        // Tentativa 2: fetch no-cors (fallback se CORS bloquear)

        try {
            let resposta = null;
            let usouNoCors = false;

            // Tentativa 1: fetch normal
            try {
                showStatus(tab, 'Enviando... (tentativa com resposta)');
                const resp = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: payload,
                    redirect: 'follow'
                });

                if (resp.ok) {
                    const texto = await resp.text();
                    console.log('[KitMojo] Resposta do servidor:', texto);
                    try {
                        resposta = JSON.parse(texto);
                    } catch (parseErr) {
                        // Resposta não é JSON, mas o request foi OK
                        resposta = { status: 'ok', raw: texto };
                    }
                } else {
                    console.warn('[KitMojo] Status HTTP:', resp.status);
                    throw new Error('HTTP ' + resp.status);
                }
            } catch (corsErr) {
                // Se deu erro de CORS, tenta no-cors
                console.warn('[KitMojo] Fetch normal falhou (provavelmente CORS), tentando no-cors...', corsErr.message);
                showStatus(tab, 'Enviando... (modo alternativo)');
                usouNoCors = true;

                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: payload
                });

                resposta = { status: 'ok-no-cors', nota: 'Enviado via no-cors, não é possível confirmar o resultado.' };
            }

            console.log('[KitMojo] Resultado final:', resposta);

            // Verificar se o servidor retornou erro
            if (resposta && resposta.status === 'error') {
                throw new Error(resposta.message || 'Erro desconhecido no servidor');
            }

            // Sucesso
            hideStatus(tab);

            if (usouNoCors) {
                debugLog('Enviado via modo no-cors. Se os dados não aparecerem na planilha, verifique o Apps Script. Abra o console (F12) para mais detalhes.');
            }

            document.getElementById('sucessoOverlay').classList.add('show');

        } catch (err) {
            console.error('[KitMojo] Erro ao enviar:', err);
            hideStatus(tab);
            mostrarErro(err.message || err.toString());
            btnEnviar.disabled = false;
            btnEnviar.textContent = textoOriginal;
        }
    }

    function resetarFormulario() {
        document.getElementById('formEntrega').reset();
        document.getElementById('formDevolucao').reset();

        ['entrega', 'devolucao'].forEach(tab => {
            // Reset foto
            document.getElementById('preview-' + tab).style.display = 'none';
            document.getElementById('img-' + tab).src = '';
            document.getElementById('btnNova-' + tab).style.display = 'none';
            document.getElementById('btnTirar-' + tab).style.display = 'none';
            document.getElementById('btnVirar-' + tab).style.display = 'none';
            document.getElementById('fileInput-' + tab).value = '';
            const area = document.getElementById('cameraArea-' + tab);
            area.querySelectorAll('.btn-abrir').forEach(b => b.style.display = 'inline-flex');
            area.classList.remove('has-photo', 'active');
            document.getElementById('placeholder-' + tab).style.display = 'block';
            fotos[tab] = false;
            pararCamera(tab);

            // Reset checks
            document.querySelectorAll('#checklist-' + tab + ' .check-item').forEach(c => c.classList.remove('checked'));

            // Reset iphone
            document.querySelectorAll('#tab-' + tab + ' .iphone-option').forEach(o => o.classList.remove('selected'));

            // Reset botão
            document.getElementById('btnEnviar-' + tab).disabled = true;

            // Reset status
            hideStatus(tab);
        });

        hideDebug();
        document.getElementById('sucessoOverlay').classList.remove('show');
    }

    window.addEventListener('beforeunload', () => {
        pararCamera('entrega');
        pararCamera('devolucao');
    });
</script>
